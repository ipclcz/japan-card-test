<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Japan Legacy · AR Experience</title>
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image.prod.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.150.1/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-three.prod.js"></script>

<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;700&family=Space+Mono:wght@400;700&display=swap');
  :root { --ink: #0a0e1a; --gold: #c9a84c; --teal: #1D9E75; --purple: #534AB7; --pink: #D4537E; --gray: #888780; --border: rgba(255,255,255,0.12); }
  body { background: var(--ink); color: #fff; font-family: 'Space Mono', monospace; margin: 0; overflow: hidden; }
  .screen { position: absolute; inset: 0; display: flex; flex-direction: column; }
  .hidden { display: none; }
  
  /* 3D 卡片容器 */
  .card-scene { width: 160px; height: 225px; perspective: 1000px; margin: 40px auto 20px; cursor: pointer; }
  .card-3d { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
  .card-3d.flipped { transform: rotateY(180deg); }
  .card-face { position: absolute; inset: 0; backface-visibility: hidden; border-radius: 12px; border: 2px solid; overflow: hidden; display: flex; flex-direction: column; align-items: center; background: #000; }
  .card-back { transform: rotateY(180deg); padding: 15px; text-align: center; justify-content: center; background: #0d0820; }
  
  /* 图片展示区 */
  .card-art-box { width: 100%; height: 75%; overflow: hidden; position: relative; }
  .card-img { width: 100%; height: 100%; object-fit: cover; }
  
  .card-label { padding: 8px 0; text-align: center; width: 100%; }
  .rarity-tag { position: absolute; top: 8px; right: 8px; font-size: 10px; color: var(--gold); border: 1px solid var(--gold); padding: 2px 6px; border-radius: 4px; background: rgba(0,0,0,0.5); }

  /* 按钮与底部栏 */
  .btn-main { border: 1.5px solid var(--teal); color: var(--teal); padding: 14px 30px; background: none; cursor: pointer; text-transform: uppercase; letter-spacing: 2px; font-size: 12px; }
  .selector-row { display: flex; overflow-x: auto; padding: 15px; gap: 12px; border-top: 1px solid var(--border); scrollbar-width: none; }
  .thumb { flex: 0 0 50px; height: 70px; border-radius: 6px; border: 1.5px solid transparent; overflow: hidden; cursor: pointer; opacity: 0.6; transition: 0.3s; }
  .thumb.active { opacity: 1; border-color: #fff; transform: translateY(-5px); }
</style>
</head>
<body>

<div id="screen-landing" class="screen">
  <div style="margin: auto; text-align: center; padding: 20px;">
    <h1 style="font-family:'Noto Serif JP'; font-size: 36px; margin-bottom: 0;">JAPAN LEGACY</h1>
    <p style="color: var(--gold); font-size: 11px; letter-spacing: 4px; margin-top: 5px;">2026 AR COLLECTION</p>
    <div style="margin-top: 60px; display: flex; flex-direction: column; gap: 15px;">
       <button class="btn-main" onclick="showScreen('demo')">View Collection</button>
       <button class="btn-main" style="border-color:var(--gold); color:var(--gold);" onclick="startAR()">Start AR Scan</button>
    </div>
  </div>
</div>

<div id="screen-demo" class="screen hidden">
  <div style="padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border);">
    <span style="color:var(--gold); font-size: 12px;">⛩ COLLECTION PREVIEW</span>
    <button onclick="showScreen('landing')" style="background:none; border:none; color:#888; font-size: 12px;">BACK</button>
  </div>
  
  <div class="card-scene" onclick="flipCard()">
    <div id="card3d" class="card-3d">
      <div class="card-face card-front" id="card-border">
        <div class="rarity-tag">SSR</div>
        <div class="card-art-box" id="card-art-html"></div>
        <div class="card-label">
          <div id="card-name" style="font-weight:bold; font-size:14px; letter-spacing:1px;">NAME</div>
          <div id="card-jp" style="font-family:'Noto Serif JP'; font-size:12px; opacity:0.7;">日本語</div>
        </div>
      </div>
      <div class="card-face card-back">
        <div style="font-size: 10px; color: var(--gold); margin-bottom: 15px; letter-spacing: 2px;">HISTORICAL ARCHIVE</div>
        <div id="card-stats" style="font-size: 11px; line-height: 1.8; color: rgba(255,255,255,0.8);"></div>
        <div style="margin-top: 20px; font-size: 9px; opacity: 0.3;">TAP TO FLIP</div>
      </div>
    </div>
  </div>

  <div id="thumb-list" class="selector-row"></div>
</div>

<div id="screen-ar" class="screen hidden">
  <div id="ar-container" style="width:100%; height:100%;"></div>
  <button onclick="stopAR()" style="position:absolute; bottom:40px; left:50%; transform:translateX(-50%); z-index:100; padding:12px 30px; background:rgba(0,0,0,0.8); color:#fff; border:1px solid var(--gold); border-radius:30px; font-size:12px;">EXIT AR</button>
</div>

<script>
